<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视频上传工具 - Supabase Storage</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      width: 100%;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    h1 {
      color: #fff;
      font-size: 28px;
      margin-bottom: 10px;
      text-align: center;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.7);
      text-align: center;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .upload-area {
      border: 2px dashed rgba(255, 255, 255, 0.3);
      border-radius: 15px;
      padding: 60px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 20px;
    }

    .upload-area:hover {
      border-color: rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.05);
    }

    .upload-area.uploading {
      border-color: #4CAF50;
      background: rgba(76, 175, 80, 0.1);
      cursor: not-allowed;
    }

    .upload-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .upload-text {
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .upload-hint {
      color: rgba(255, 255, 255, 0.6);
      font-size: 13px;
    }

    .result-box {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
      padding: 20px;
      margin-top: 20px;
      display: none;
    }

    .result-box.show {
      display: block;
    }

    .result-box.success {
      border: 1px solid rgba(76, 175, 80, 0.5);
      background: rgba(76, 175, 80, 0.1);
    }

    .result-box.error {
      border: 1px solid rgba(244, 67, 54, 0.5);
      background: rgba(244, 67, 54, 0.1);
    }

    .result-title {
      color: #fff;
      font-weight: 600;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .result-url {
      width: 100%;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      padding: 12px;
      color: #fff;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
      margin-top: 10px;
    }

    .result-url:hover {
      border-color: rgba(255, 255, 255, 0.4);
    }

    .code-example {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 8px;
      padding: 15px;
      margin-top: 15px;
      overflow-x: auto;
    }

    .code-example pre {
      color: #4CAF50;
      font-family: monospace;
      font-size: 12px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .info-box {
      background: rgba(33, 150, 243, 0.1);
      border: 1px solid rgba(33, 150, 243, 0.3);
      border-radius: 10px;
      padding: 15px;
      margin-top: 20px;
      color: rgba(255, 255, 255, 0.9);
      font-size: 13px;
      line-height: 1.6;
    }

    .spinner {
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top: 3px solid #fff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎥 视频上传工具</h1>
    <p class="subtitle">上传您的背景视频到 Supabase Storage</p>

    <input type="file" id="fileInput" accept="video/*" style="display: none;">

    <div class="upload-area" id="uploadArea">
      <div class="upload-icon" id="uploadIcon">📤</div>
      <div class="upload-text" id="uploadText">点击选择视频文件</div>
      <div class="upload-hint">支持 MP4, WebM, MOV 格式，最大 100MB</div>
    </div>

    <div class="result-box" id="resultBox">
      <div class="result-title">
        <span id="resultIcon">✅</span>
        <span id="resultTitle">上传成功！</span>
      </div>
      <p id="resultMessage" style="color: rgba(255, 255, 255, 0.8); font-size: 13px; margin-bottom: 10px;"></p>

      <input type="text" class="result-url" id="resultUrl" readonly placeholder="视频 URL 将显示在这里...">

      <div class="code-example">
        <pre id="codeExample"></pre>
      </div>
    </div>

    <div class="info-box">
      💡 <strong>提示：</strong>上传后，视频将存储在 Supabase 云端。您可以在任何地方使用这个 URL，不需要将大文件放在项目代码中。
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const supabaseUrl = import.meta.env.VITE_SUPABASE_URL || 'YOUR_SUPABASE_URL';
    const supabaseKey = import.meta.env.VITE_SUPABASE_ANON_KEY || 'YOUR_SUPABASE_ANON_KEY';

    const supabase = createClient(supabaseUrl, supabaseKey);

    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const uploadIcon = document.getElementById('uploadIcon');
    const uploadText = document.getElementById('uploadText');
    const resultBox = document.getElementById('resultBox');
    const resultIcon = document.getElementById('resultIcon');
    const resultTitle = document.getElementById('resultTitle');
    const resultMessage = document.getElementById('resultMessage');
    const resultUrl = document.getElementById('resultUrl');
    const codeExample = document.getElementById('codeExample');

    uploadArea.addEventListener('click', () => {
      if (!uploadArea.classList.contains('uploading')) {
        fileInput.click();
      }
    });

    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      try {
        uploadArea.classList.add('uploading');
        uploadIcon.innerHTML = '<div class="spinner"></div>';
        uploadText.textContent = '上传中...';
        resultBox.classList.remove('show', 'success', 'error');

        if (file.size > 100 * 1024 * 1024) {
          throw new Error('文件太大！请选择小于 100MB 的视频');
        }

        if (!file.type.startsWith('video/')) {
          throw new Error('请选择视频文件');
        }

        const fileExt = file.name.split('.').pop();
        const fileName = `${Math.random().toString(36).substring(2)}-${Date.now()}.${fileExt}`;
        const filePath = `backgrounds/${fileName}`;

        const { error: uploadError, data } = await supabase.storage
          .from('videos')
          .upload(filePath, file, {
            cacheControl: '3600',
            upsert: false
          });

        if (uploadError) throw uploadError;

        const { data: { publicUrl } } = supabase.storage
          .from('videos')
          .getPublicUrl(filePath);

        resultBox.classList.add('show', 'success');
        resultIcon.textContent = '✅';
        resultTitle.textContent = '上传成功！';
        resultMessage.textContent = '视频已上传到 Supabase Storage';
        resultUrl.value = publicUrl;
        codeExample.textContent = `<video src="${publicUrl}" autoPlay loop muted playsInline />`;

        console.log('✅ 视频上传成功！');
        console.log('📍 URL:', publicUrl);

      } catch (error) {
        console.error('上传失败:', error);

        resultBox.classList.add('show', 'error');
        resultIcon.textContent = '❌';
        resultTitle.textContent = '上传失败';
        resultMessage.textContent = error.message;
      } finally {
        uploadArea.classList.remove('uploading');
        uploadIcon.textContent = '📤';
        uploadText.textContent = '点击选择视频文件';
        fileInput.value = '';
      }
    });

    resultUrl.addEventListener('click', (e) => {
      e.target.select();
      navigator.clipboard.writeText(e.target.value);

      const originalText = uploadText.textContent;
      uploadText.textContent = '✓ URL 已复制！';
      setTimeout(() => {
        uploadText.textContent = originalText;
      }, 2000);
    });
  </script>
</body>
</html>
